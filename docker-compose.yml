version: '3.8'

services:
  stoneaio-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stoneaio_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./stoneaio.db:/app/stoneaio.db
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=./stoneaio.db
    networks:
      - stone_net

  caddy:
    image: caddy:2.7.6-alpine
    container_name: stoneaio_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
    networks:
      - stone_net

networks:
  stone_net:
    name: stone_net
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
